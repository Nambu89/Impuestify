[pytest]
# Pytest configuration for TaxIA

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Warnings filter
filterwarnings =
    # Ignore SSL ResourceWarning from httpx/lark
    ignore::ResourceWarning
    # Ignore Typer deprecation warning
    ignore:The 'is_flag' and 'flag_value' parameters:DeprecationWarning:typer
    # Ignore PyPDF2 deprecation (we're migrating to pypdf)
    ignore:PyPDF2 is deprecated:DeprecationWarning
    # Ignore specific warnings from dependencies
    ignore::DeprecationWarning:guardrails

# Async support
asyncio_mode = auto

# Test paths
testpaths = tests

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
