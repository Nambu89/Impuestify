# Railway Config — Impuestify Backend
# Docs: https://docs.railway.com/reference/config-as-code
# Schema: https://backboard.railway.app/railway.schema.json
#
# Build plan (provider, install, start command) lives in `railpack.json` at
# the repo root. Without `provider: python` there, Railpack auto-detected
# only Node from the dev `package.json` and `pip` was unavailable at build
# time. railway.toml only sets healthcheck + restart policy now.

[build]
builder = "RAILPACK"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
