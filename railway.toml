# Railway Config — Impuestify Backend
# Docs: https://docs.railway.com/reference/config-as-code
# Schema: https://backboard.railway.app/railway.schema.json
# Note: This file configures the backend service only.
# Root Directory is set to /backend in the Railway dashboard.

[build]
builder = "RAILPACK"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
